<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuồng Việt Nam - Nền Tảng Tương Tác</title>
    <!-- Ẩn cảnh báo "should not be used in production" khi cố ý dùng CDN (workaround) -->
    <script>
      (function () {
        var _warn = console.warn;
        console.warn = function () {
          if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].indexOf('should not be used in production') !== -1) return;
          return _warn.apply(console, arguments);
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#eec02b",
              "background-light": "#f8f8f6",
              "background-dark": "#121212",
              "accent-red": "#8b0000",
              "surface-dark": "#1e1e1e",
              "border-gold": "#4a3f23",
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
    <style>
      /* Nền tối ngay khi load, tránh trang trắng trước khi React/CSS chạy */
      body { margin: 0; background: #120e18; color: #f5f0e8; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
